name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller packaging/macos.spec

      - name: Ad-hoc sign
        run: codesign --force --deep --sign - dist/OpenCapture.app

      - name: Create archive
        run: cd dist && zip -r ../OpenCapture-macOS-arm64.zip OpenCapture.app

      - uses: actions/upload-artifact@v4
        with:
          name: OpenCapture-macOS-arm64
          path: OpenCapture-macOS-arm64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller packaging/windows.spec

      - name: Create archive
        run: Compress-Archive -Path dist/OpenCapture -DestinationPath OpenCapture-Windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: OpenCapture-Windows-x86_64
          path: OpenCapture-Windows-x86_64.zip

  publish-pypi:
    runs-on: ubuntu-latest
    # Only run if PYPI_API_TOKEN is configured
    if: ${{ vars.ENABLE_PYPI == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  create-release:
    needs: [build-macos-arm, build-windows]
    # Don't require publish-pypi (it may be skipped)
    if: ${{ always() && needs.build-macos-arm.result == 'success' && needs.build-windows.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/OpenCapture-macOS-arm64/OpenCapture-macOS-arm64.zip
            artifacts/OpenCapture-Windows-x86_64/OpenCapture-Windows-x86_64.zip
