name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i '' "s/version = \"0.0.0\"/version = \"$VERSION\"/" pyproject.toml
          sed -i '' "s/__version__ = \"0.0.0\"/__version__ = \"$VERSION\"/" src/opencapture/__init__.py
          sed -i '' "s/\"CFBundleVersion\": \"0.0.0\"/\"CFBundleVersion\": \"$VERSION\"/" packaging/macos.spec
          sed -i '' "s/\"CFBundleShortVersionString\": \"0.0.0\"/\"CFBundleShortVersionString\": \"$VERSION\"/" packaging/macos.spec

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller packaging/macos.spec

      - name: Check signing secrets
        id: check-signing
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          if [ -n "$MACOS_CERTIFICATE" ]; then
            echo "has_certificate=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing certificate
        if: steps.check-signing.outputs.has_certificate == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERT_FILE=$(mktemp /tmp/certificate.XXXXXX.p12)
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_FILE"

          KEYCHAIN_PATH=$(mktemp -u /tmp/build.XXXXXX.keychain-db)
          KEYCHAIN_PWD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$CERT_FILE" -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          rm -f "$CERT_FILE"

      - name: Sign with Developer ID
        if: steps.check-signing.outputs.has_certificate == 'true'
        run: |
          codesign --force --deep --sign "Developer ID Application" \
            --options runtime \
            --timestamp \
            dist/OpenCapture.app

      - name: Ad-hoc sign (fallback)
        if: steps.check-signing.outputs.has_certificate != 'true'
        run: codesign --force --deep --sign - dist/OpenCapture.app

      - name: Create archive
        run: cd dist && zip -r ../OpenCapture-macOS-arm64.zip OpenCapture.app

      - name: Notarize
        if: steps.check-signing.outputs.has_certificate == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit OpenCapture-macOS-arm64.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        if: steps.check-signing.outputs.has_certificate == 'true'
        run: |
          xcrun stapler staple dist/OpenCapture.app
          # Re-zip with stapled ticket
          rm -f OpenCapture-macOS-arm64.zip
          cd dist && zip -r ../OpenCapture-macOS-arm64.zip OpenCapture.app

      - name: Cleanup keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: security delete-keychain "$KEYCHAIN_PATH"

      - uses: actions/upload-artifact@v4
        with:
          name: OpenCapture-macOS-arm64
          path: OpenCapture-macOS-arm64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/version = \"0.0.0\"/version = \"$VERSION\"/" pyproject.toml
          sed -i "s/__version__ = \"0.0.0\"/__version__ = \"$VERSION\"/" src/opencapture/__init__.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller packaging/windows.spec

      - name: Create archive
        run: Compress-Archive -Path dist/OpenCapture -DestinationPath OpenCapture-Windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: OpenCapture-Windows-x86_64
          path: OpenCapture-Windows-x86_64.zip

  publish-pypi:
    runs-on: ubuntu-latest
    # Only run if PYPI_API_TOKEN is configured
    if: ${{ vars.ENABLE_PYPI == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/version = \"0.0.0\"/version = \"$VERSION\"/" pyproject.toml
          sed -i "s/__version__ = \"0.0.0\"/__version__ = \"$VERSION\"/" src/opencapture/__init__.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  create-release:
    needs: [build-macos-arm, build-windows]
    # Don't require publish-pypi (it may be skipped)
    if: ${{ always() && needs.build-macos-arm.result == 'success' && needs.build-windows.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/OpenCapture-macOS-arm64/OpenCapture-macOS-arm64.zip
            artifacts/OpenCapture-Windows-x86_64/OpenCapture-Windows-x86_64.zip
